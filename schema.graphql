  amount: BigInt! # uint256
  nonce: BigInt! # uint256
  poolId: BigInt! # uint256
  gemId: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

